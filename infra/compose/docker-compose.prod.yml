services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-campusfit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-campusfit_ai}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../../infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${API_IMAGE:-campusfit-api:latest}
    restart: unless-stopped
    env_file:
      - path: ../../.env.production
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3050/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5

  web:
    image: ${WEB_IMAGE:-campusfit-web:latest}
    restart: unless-stopped
    env_file:
      - path: ../../.env.production
        required: false
    depends_on:
      api:
        condition: service_healthy

  admin:
    image: ${ADMIN_IMAGE:-campusfit-admin:latest}
    restart: unless-stopped
    env_file:
      - path: ../../.env.production
        required: false
    depends_on:
      api:
        condition: service_healthy

  ai-service:
    image: ${AI_SERVICE_IMAGE:-campusfit-ai-service:latest}
    restart: unless-stopped
    env_file:
      - path: ../../.env.production
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
      admin:
        condition: service_started
      api:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/campusfit.conf:/etc/nginx/conf.d/default.conf:ro
      - ${TLS_CERT_DIR:-./certs}:/etc/nginx/certs:ro

volumes:
  postgres-data:
