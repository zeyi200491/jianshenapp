limit_req_zone $binary_remote_addr zone=campusfit_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=campusfit_login:10m rate=3r/m;

upstream campusfit_web {
  server web:3200;
}

upstream campusfit_admin {
  server admin:3100;
}

upstream campusfit_api {
  server api:3050;
}

upstream campusfit_ai {
  server ai-service:8001;
}

server {
  listen 80;
  server_name example.com admin.example.com api.example.com ai.example.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name example.com;

  ssl_certificate /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;

  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header X-Frame-Options DENY always;

  location / {
    proxy_pass http://campusfit_web;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}

server {
  listen 443 ssl http2;
  server_name admin.example.com;

  ssl_certificate /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;

  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header X-Frame-Options DENY always;

  location /api/v1/admin/auth/login {
    limit_req zone=campusfit_login burst=5 nodelay;
    proxy_pass http://campusfit_admin;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location / {
    proxy_pass http://campusfit_admin;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}

server {
  listen 443 ssl http2;
  server_name api.example.com;

  ssl_certificate /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  client_max_body_size 2m;

  location /api/v1/auth/email/request-code {
    limit_req zone=campusfit_login burst=5 nodelay;
    proxy_pass http://campusfit_api;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location / {
    limit_req zone=campusfit_api burst=30 nodelay;
    proxy_pass http://campusfit_api;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}

server {
  listen 443 ssl http2;
  server_name ai.example.com;

  ssl_certificate /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;

  location / {
    limit_req zone=campusfit_api burst=20 nodelay;
    proxy_pass http://campusfit_ai;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
